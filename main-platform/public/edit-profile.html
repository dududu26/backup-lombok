<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, textarea, button { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: #1877f2; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Edit Profil Anda</h3>
        <form action="/api/update-profile" method="POST" enctype="multipart/form-data">
            <input type="file" name="photo" accept="image/*">
            <input type="text" name="fullName" placeholder="Nama Lengkap" required>
            <textarea name="bio" placeholder="Bio Singkat"></textarea>
            <button type="submit">Simpan Perubahan</button>
        </form>
    </div>
</body>
</html>
