<body class="bg-slate-900 text-white flex items-center justify-center h-screen">
    <form action="/register" method="POST" class="bg-slate-800 p-8 rounded-lg shadow-xl w-80">
        <h2 class="text-2xl font-bold mb-6 text-center">Daftar Akun</h2>
        <input type="text" name="username" placeholder="Username" class="w-full p-2 mb-4 bg-slate-700 rounded" required>
        <input type="password" name="password" placeholder="Password" class="w-full p-2 mb-6 bg-slate-700 rounded" required>
        <button class="w-full bg-blue-600 py-2 rounded font-bold hover:bg-blue-700">Buat Akun</button>
        <p class="mt-4 text-sm text-center">Sudah punya akun? <a href="/login.html" class="text-blue-400">Login</a></p>
    </form>
</body>
