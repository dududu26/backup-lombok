<!DOCTYPE html>
<html>
<head><title>Login</title><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="font-family:sans-serif; background:#f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh;">
    <form action="/login" method="POST" style="background:white; padding:20px; border-radius:10px; width:300px;">
        <h2 style="text-align:center;">Login</h2>
        <input type="text" name="username" placeholder="Username" style="width:100%; margin:10px 0; padding:10px;" required>
        <input type="password" name="password" placeholder="Password" style="width:100%; margin:10px 0; padding:10px;" required>
        <button type="submit" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px;">Masuk</button>
        <p style="text-align:center;">Belum punya akun? <a href="/register">Daftar</a></p>
    </form>
</body>
</html>
