<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS OS v3.9 - DUHA AL KHAIRI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --cyan: #00f2ff; --glass: rgba(0, 0, 0, 0.85); }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        #video {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transition: filter 0.1s, transform 0.3s;
            image-rendering: -webkit-optimize-contrast;
            contrast: 1.1;
        }

        .mirrored { transform: scaleX(-1); }

        #shutter { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; opacity: 0; z-index: 100; pointer-events: none; 
        }

        .hud-top {
            position: absolute; top: 0; left: 0; right: 0; padding: 25px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; z-index: 10;
        }

        .sys-info { border-left: 3px solid var(--cyan); padding-left: 12px; }
        #time-display { font-size: 20px; font-weight: bold; color: var(--cyan); }

        #map-container {
            position: absolute; top: 90px; right: 20px; width: 100px; height: 100px;
            border-radius: 50%; border: 2px solid var(--cyan); overflow: hidden; z-index: 25;
        }
        #map { width: 100%; height: 100%; }

        .manual-controls {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            width: 85%; display: flex; flex-direction: column; gap: 15px; z-index: 25;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; backdrop-filter: blur(5px);
        }

        .slider-group { display: flex; align-items: center; gap: 15px; }
        .slider-group label { font-size: 9px; color: var(--cyan); font-weight: bold; width: 50px; }
        input[type=range] { appearance: none; flex: 1; height: 4px; background: #333; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: var(--cyan); border-radius: 50%; }

        .panel-bottom {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 20px;
            background: linear-gradient(to top, #000 60%, transparent); z-index: 20;
            display: flex; flex-direction: column; align-items: center;
        }

        .info-glass {
            background: var(--glass); backdrop-filter: blur(15px); padding: 12px; border-radius: 12px;
            width: 92%; border: 1px solid rgba(0,242,255,0.2); margin-bottom: 15px;
        }

        #addr-text { font-size: 11px; font-weight: bold; color: #fff; margin-bottom: 4px; }

        .btn-group { display: flex; align-items: center; gap: 30px; }
        
        /* ANIMASI TOMBOL JEPRET KEREN */
        .btn-snap {
            width: 75px; height: 75px; background: #fff; border-radius: 50%; border: 4px solid var(--cyan);
            position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .btn-snap::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid #fff;
            animation: pulse-ring 2s infinite;
        }

        .btn-snap:active { transform: scale(0.85); box-shadow: 0 0 5px var(--cyan); }
        
        .btn-snap-inner {
            width: 55px; height: 55px; background: #fff; border-radius: 50%;
            border: 2px solid #000; transition: all 0.2s;
        }
        
        .btn-snap:active .btn-snap-inner { background: var(--cyan); transform: scale(0.9); }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .btn-side { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.3); 
            color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer;
        }
        .btn-side.active { background: var(--cyan); color: #000; border-color: #fff; }

        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="shutter"></div>

<div class="hud-top">
    <div class="sys-info">
        <div id="date-display" style="font-size: 10px; opacity: 0.7;">...</div>
        <div id="time-display">00:00:00</div>
    </div>
</div>

<div id="map-container"><div id="map"></div></div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas" style="display:none;"></canvas>

<div class="manual-controls">
    <div class="slider-group">
        <label>Saturasi</label>
        <input type="range" id="sat-ctrl" min="0" max="200" value="100" oninput="applyFilters()">
    </div>
    <div class="slider-group">
        <label>Tajam</label>
        <input type="range" id="con-ctrl" min="50" max="200" value="110" oninput="applyFilters()">
    </div>
</div>

<div class="panel-bottom">
    <div class="info-glass">
        <div id="addr-text">GPS LOCKING...</div>
        <div id="coords-text" style="font-size: 9px; color: var(--cyan);">MENCARI KOORDINAT...</div>
    </div>
    <div class="btn-group">
        <button class="btn-side" id="mirror-btn" onclick="toggleMirror()">MIRROR</button>
        <div class="btn-snap" onclick="takePhoto()">
            <div class="btn-snap-inner"></div>
        </div>
        <button class="btn-side" onclick="flipCamera()">FLIP</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const video = document.getElementById('video');
    const addrText = document.getElementById('addr-text');
    const coordsText = document.getElementById('coords-text');
    const shutter = document.getElementById('shutter');
    let currentPos = { lat: 0, lon: 0, addr: "MENCARI ALAMAT LENGKAP..." };
    let currentFacingMode = "environment";
    let isMirrored = false;
    let stream = null;

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 18);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    let marker = L.marker([0, 0]).addTo(map);

    function updateClock() {
        const now = new Date();
        document.getElementById('date-display').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('time-display').innerText = now.toLocaleTimeString('id-ID');
    }
    setInterval(updateClock, 1000);

    function toggleMirror() {
        isMirrored = !isMirrored;
        const btn = document.getElementById('mirror-btn');
        if (isMirrored) {
            video.classList.add('mirrored');
            btn.classList.add('active');
        } else {
            video.classList.remove('mirrored');
            btn.classList.remove('active');
        }
    }

    function applyFilters() {
        const sat = document.getElementById('sat-ctrl').value;
        const con = document.getElementById('con-ctrl').value;
        video.style.filter = `saturate(${sat}%) contrast(${con}%) brightness(1.05)`;
    }

    async function startCamera(mode) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            const constraints = {
                video: {
                    facingMode: mode,
                    width: { min: 1280, ideal: 1920, max: 3840 },
                    height: { min: 720, ideal: 1080, max: 2160 }
                }
            };
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            applyFilters();
        } catch (e) { alert("Gagal akses kamera!"); }
    }

    function flipCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        startCamera(currentFacingMode);
    }

    startCamera(currentFacingMode);

    navigator.geolocation.watchPosition(p => {
        const { latitude: lat, longitude: lon } = p.coords;
        currentPos.lat = lat; currentPos.lon = lon;
        map.setView([lat, lon], 18);
        marker.setLatLng([lat, lon]);
        coordsText.innerText = `COORD: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
            .then(res => res.json()).then(data => {
                const a = data.address;
                const desa = a.village || a.hamlet || a.suburb || "";
                const kec = a.city_district || a.district || "";
                const kab = a.city || a.regency || "";
                const prov = a.state || "";
                currentPos.addr = `${desa}, ${kec}, ${kab}, ${prov}`.toUpperCase();
                addrText.innerText = currentPos.addr;
            });
    }, null, { enableHighAccuracy: true });

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';
        for(let n = 0; n < words.length; n++) {
            let testLine = line + words[n] + ' ';
            if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                ctx.fillText(line, x, y);
                line = words[n] + ' ';
                y += lineHeight;
            } else { line = testLine; }
        }
        ctx.fillText(line, x, y);
        return y;
    }

    function takePhoto() {
        if(navigator.vibrate) navigator.vibrate(50);
        shutter.style.animation = 'none';
        setTimeout(() => { shutter.style.animation = 'flash 0.1s ease-out'; }, 10);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.imageSmoothingEnabled = false;

        ctx.save();
        if (isMirrored) {
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
        }
        ctx.filter = video.style.filter;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        const mapImg = new Image();
        mapImg.crossOrigin = "anonymous";
        mapImg.src = `https://mt1.google.com/vt/lyrs=y&x=${Math.floor((currentPos.lon + 180) / 360 * Math.pow(2, 18))}&y=${Math.floor((1 - Math.log(Math.tan(currentPos.lat * Math.PI / 180) + 1 / Math.cos(currentPos.lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, 18))}&z=18`;

        mapImg.onload = function() {
            const boxH = Math.floor(canvas.height * 0.22);
            const margin = 40;
            ctx.fillStyle = "rgba(0,0,0,0.85)";
            ctx.fillRect(margin, canvas.height - boxH - margin, canvas.width - (margin * 2), boxH);
            ctx.fillStyle = "#00f2ff";
            ctx.fillRect(margin, canvas.height - boxH - margin, 8, boxH);

            const radius = (boxH / 2) - 20;
            const mapX = margin + radius + 25;
            const mapY = (canvas.height - margin) - (boxH / 2);

            ctx.save();
            ctx.beginPath(); ctx.arc(mapX, mapY, radius, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(mapImg, mapX - radius, mapY - radius, radius * 2, radius * 2);
            ctx.restore();

            ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(mapX, mapY, 5, 0, 7); ctx.fill();

            const textX = mapX + radius + 35;
            const fs = Math.floor(canvas.width / 45);
            ctx.fillStyle = "white";
            ctx.font = `bold ${fs}px Arial`;
            let nextY = wrapText(ctx, `LOC: ${currentPos.addr}`, textX, (canvas.height - boxH - margin) + 60, canvas.width - textX - (margin * 2), fs * 1.2);

            ctx.fillStyle = "rgba(255,255,255,0.8)";
            ctx.font = `${fs * 0.75}px monospace`;
            ctx.fillText(`GPS: ${currentPos.lat.toFixed(6)}, ${currentPos.lon.toFixed(6)}`, textX, nextY + 40);
            ctx.fillText(`TIME: ${new Date().toLocaleString('id-ID')}`, textX, nextY + 40 + (fs));

            ctx.fillStyle = "#00f2ff";
            ctx.font = `bold ${fs * 0.65}px monospace`;
            ctx.fillText('SYSTEMS BY DUHA AL KHAIRI', textX, canvas.height - margin - 30);

            const link = document.createElement('a');
            link.download = `GPS_${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        };
    }
</script>
</body>
</html>
