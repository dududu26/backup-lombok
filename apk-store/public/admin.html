<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Kedai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-6">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-2xl font-black italic text-blue-500 uppercase tracking-tighter">DASHBOARD ADMIN</h1>
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Kedai APK DWD Management</p>
                <a href="/" class="text-[10px] font-black uppercase text-slate-400 border-b border-slate-700 hover:text-white transition-all">Buka Store</a>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="bg-slate-900/50 p-8 rounded-[2.5rem] border border-slate-800">
                    <h3 class="text-[10px] font-black uppercase text-blue-400 mb-6 italic tracking-widest">Pengaturan Admin</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[8px] font-black uppercase text-slate-600 ml-2">WhatsApp Admin</label>
                            <input type="text" id="adminWA" class="w-full bg-slate-950 p-4 rounded-2xl text-xs font-bold border border-slate-800 outline-none focus:ring-2 ring-blue-500/20">
                        </div>
                        <div>
                            <label class="text-[8px] font-black uppercase text-slate-600 ml-2">Rekening/Payment</label>
                            <input type="text" id="adminRek" class="w-full bg-slate-950 p-4 rounded-2xl text-xs font-bold border border-slate-800 outline-none focus:ring-2 ring-blue-500/20">
                        </div>
                        <button onclick="updateSettings()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-blue-900/20 active:scale-95 transition-all">Update Pengaturan</button>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-8 rounded-[2.5rem] border border-slate-800">
                    <h3 class="text-[10px] font-black uppercase text-green-400 mb-6 italic tracking-widest">Tambah Kontributor</h3>
                    <div class="space-y-4">
                        <input type="text" id="uName" placeholder="NAMA MEMBER" class="w-full bg-slate-950 p-4 rounded-2xl text-xs font-bold border border-slate-800 outline-none focus:ring-2 ring-blue-500/20 uppercase">
                        <input type="text" id="uCode" placeholder="KODE AKSES" class="w-full bg-slate-950 p-4 rounded-2xl text-xs font-bold border border-slate-800 outline-none focus:ring-2 ring-blue-500/20 uppercase">
                        <button onclick="addUser()" class="w-full bg-slate-100 text-slate-900 py-4 rounded-2xl font-black text-[10px] uppercase active:scale-95 transition-all">Simpan Member</button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="bg-slate-900/50 rounded-[2.5rem] border border-slate-800 overflow-hidden">
                    <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/80">
                        <h3 class="text-[10px] font-black uppercase text-slate-500 italic">Daftar Member & File</h3>
                        <span id="userCount" class="text-[9px] bg-slate-800 px-3 py-1 rounded-full font-bold">0 MEMBER</span>
                    </div>
                    
                    <div id="uList" class="divide-y divide-slate-800 max-h-[70vh] overflow-y-auto no-scrollbar">
                        </div>
                </div>

                <div class="bg-slate-900/50 rounded-[2.5rem] border border-slate-800 overflow-hidden">
                    <div class="p-6 border-b border-slate-800 bg-slate-900/80">
                        <h3 class="text-[10px] font-black uppercase text-red-400 italic">Aplikasi Tanpa Pemilik (Orphaned)</h3>
                    </div>
                    <div id="orphanList" class="p-8 space-y-3">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let settings = { users: [], adminWA: '', adminRek: '' }, apps = [];

        async function load() {
            try {
                const [sRes, aRes] = await Promise.all([
                    fetch('/api/settings'),
                    fetch('/api/files')
                ]);
                settings = await sRes.json();
                apps = await aRes.json();

                document.getElementById('adminWA').value = settings.adminWA || '';
                document.getElementById('adminRek').value = settings.adminRek || '';
                document.getElementById('userCount').innerText = `${settings.users.length} MEMBER`;

                renderUsers();
                renderOrphans();
            } catch(e) { console.error(e); }
        }

        function renderUsers() {
            const list = document.getElementById('uList');
            list.innerHTML = settings.users.map(u => {
                const uFiles = apps.filter(x => x.owner === u.name);
                return `
                <div class="p-8 group hover:bg-slate-900/80 transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h4 class="font-black text-sm uppercase text-blue-400 tracking-tight">${u.name}</h4>
                            <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">${u.code}</p>
                        </div>
                        <button onclick="delUser('${u.code}')" class="text-red-500 text-xs opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-user-minus"></i></button>
                    </div>
                    <div class="space-y-3 pl-4 border-l-2 border-slate-800">
                        ${uFiles.map(f => `
                            <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-800">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-lg bg-slate-800 overflow-hidden">
                                        ${f.icon ? `<img src="/icons/${f.icon}" class="w-full h-full object-cover">` : `<i class="fas fa-cube text-slate-700 p-2"></i>`}
                                    </div>
                                    <span class="text-[10px] font-bold uppercase truncate max-w-[150px]">${f.displayName || f.name}</span>
                                </div>
                                <button onclick="delFile('${f.name}')" class="text-red-500 hover:scale-110 transition-all p-2"><i class="fas fa-trash-alt text-[10px]"></i></button>
                            </div>
                        `).join('') || '<p class="text-[9px] font-black text-slate-700 italic">BELUM ADA FILE</p>'}
                    </div>
                </div>`;
            }).reverse().join('');
        }

        function renderOrphans() {
            const list = document.getElementById('orphanList');
            // Filter aplikasi yang owner-nya tidak ada di daftar user
            const orphans = apps.filter(app => !settings.users.some(u => u.name === app.owner));
            
            if(orphans.length === 0) {
                list.innerHTML = `<p class="text-[9px] font-black text-slate-700 uppercase italic text-center">Semua aplikasi memiliki pemilik yang sah</p>`;
                return;
            }

            list.innerHTML = orphans.map(f => `
                <div class="flex justify-between items-center bg-slate-950/50 p-4 rounded-2xl border border-dashed border-slate-800">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center border border-slate-800">
                            ${f.icon ? `<img src="/icons/${f.icon}" class="w-full h-full object-cover rounded-xl">` : `<i class="fas fa-ghost text-slate-700"></i>`}
                        </div>
                        <div>
                            <div class="text-[10px] font-black uppercase text-slate-300">${f.displayName || f.name}</div>
                            <div class="text-[8px] font-bold text-red-500 uppercase italic">Owner Asli: ${f.owner || 'TIDAK TERDETEKSI'}</div>
                        </div>
                    </div>
                    <button onclick="delFile('${f.name}')" class="w-8 h-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                        <i class="fas fa-trash text-[10px]"></i>
                    </button>
                </div>
            `).join('');
        }

        async function updateSettings() {
            settings.adminWA = document.getElementById('adminWA').value;
            settings.adminRek = document.getElementById('adminRek').value;
            await saveSettings();
            alert("Pengaturan Berhasil Diperbarui!");
        }

        async function addUser() {
            const n = document.getElementById('uName').value;
            const c = document.getElementById('uCode').value;
            if(!n || !c) return alert("Isi semua data!");
            settings.users.push({name: n, code: c});
            await saveSettings();
            location.reload();
        }

        async function delUser(code) {
            if(confirm("Hapus user ini? File miliknya TIDAK akan terhapus namun aksesnya dicabut.")) {
                settings.users = settings.users.filter(u => u.code !== code);
                await saveSettings();
                load();
            }
        }

        async function delFile(fn) {
            if(confirm("Hapus file APK ini secara permanen?")) {
                await fetch(`/api/delete-file/${fn}`, { method: 'DELETE' });
                load();
            }
        }

        async function saveSettings() {
            await fetch('/api/settings/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            });
        }

        load();
    </script>
</body>
</html>
