<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>LOMBOK LIVE - Social & Ads</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
--bg: #0d0d0f; --card: #1a1a1d; --primary: #ff3b3b; --text: #ffffff;
--muted: #b0b3b8; --input-bg: #242526; --border: #333; --ads-bg: #1e1e24; --live: #4caf50;
}
body.light-mode {
--bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --muted: #65676b; --input-bg: #f0f2f5; --border: #ddd; --ads-bg: #f8f9fa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; overflow-x: hidden; }
    header { 
        background: var(--card); padding: 12px 15px; border-bottom: 1px solid var(--border); 
        position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; 
    }
    .brand { font-weight: 900; color: var(--primary); font-size: 20px; letter-spacing: 1px; }

    .theme-toggle {
        background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
        padding: 5px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: bold;
    }

    .container { max-width: 500px; margin: 0 auto; padding: 10px; }

    .shortcut-bar { display: flex; gap: 10px; margin-bottom: 15px; }
    .btn-shortcut { 
        flex: 1; background: var(--card); border: 1px solid var(--border); color: var(--text); 
        padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }

    .composer { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
    .name-bar {
        width: 100%; background: var(--input-bg); border: none; color: var(--primary);
        padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; outline: none; font-size: 13px;
    }
    .composer-top { display: flex; gap: 10px; margin-bottom: 10px; }
    .user-img { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; }
    textarea { 
        flex: 1; background: var(--input-bg); border-radius: 15px; border: none; 
        color: var(--text); padding: 10px 15px; outline: none; resize: none; font-size: 14px; min-height: 50px;
    }

    .preview-box { width: 100%; border-radius: 10px; margin: 10px 0; display: none; overflow: hidden; border: 1px solid var(--border); background: #000; }
    .preview-box img, .preview-box video { width: 100%; display: block; }
    .doc-preview { padding: 15px; color: var(--primary); font-weight: bold; font-size: 12px; text-align: center; }

    .composer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); }
    .tool-group { display: flex; gap: 12px; }
    .tool-btn { color: #45bd62; cursor: pointer; font-size: 18px; display: flex; align-items: center; }
    .btn-post { background: var(--primary); color: #fff; border: none; padding: 7px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

    /* Post & Ads & Live Styles */
    .post { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); overflow: hidden; }
    .post.is-ads { border: 1.5px solid var(--primary); background: var(--ads-bg); box-shadow: 0 4px 15px rgba(255, 59, 59, 0.1); }
    .post.is-live { border: 2px solid var(--live); box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2); }
    
    .ads-badge { background: var(--primary); color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; text-transform: uppercase; font-weight: 900; }
    .live-tag { background: var(--live); color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; font-weight: bold; animation: blink 1s infinite; }
    
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .post-info b { font-size: 14px; color: var(--primary); }
    .post-info b.live-host { color: var(--live); }
    .post-time { font-size: 11px; color: var(--muted); display: block; }
    
    .post-content { font-size: 14px; line-height: 1.5; color: var(--text); margin: 10px 0; white-space: pre-wrap; }
    .content-collapsed { max-height: 100px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
    .read-more-btn { color: var(--primary); font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 5px; display: inline-block; }

    .post-media { width: calc(100% + 30px); margin-left: -15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: #000; display: block; }
    
    /* Iklan & Live Wrapper (Clickable) */
    .click-wrapper { 
        margin: 10px -15px; cursor: pointer; display: block; text-decoration: none; 
        border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); 
        background: #000; position: relative;
    }
    .click-wrapper:hover { opacity: 0.9; }
    .preview-iframe { width: 100%; height: 280px; border: none; } 
    .preview-video { width: 100%; height: 280px; object-fit: cover; background: #000; }
    
    /* Pin Feature Overlay */
    .pin-btn {
        position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); 
        color: #fff; padding: 5px 8px; border-radius: 5px; font-size: 10px; z-index: 10;
        border: 1px solid rgba(255,255,255,0.3); font-weight: bold;
    }

    .fullscreen-overlay {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
        background: #000; z-index: 9999; display: none; flex-direction: column;
    }
    .fs-header { 
        background: #1a1a1d; padding: 10px; display: flex; 
        justify-content: space-between; align-items: center; border-bottom: 1px solid #333;
    }
    .fs-close { background: var(--primary); color: #fff; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .fs-body { flex: 1; width: 100%; height: 100%; }
    .fs-body iframe, .fs-body video { width: 100%; height: 100%; border: none; }

    .click-footer-bar { background: var(--input-bg); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
    .url-text { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; }
    .btn-visit { background: var(--primary); color: white; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    .btn-visit.btn-live { background: var(--live); }

    .file-link { display: flex; align-items: center; gap: 10px; background: var(--input-bg); padding: 12px; border-radius: 8px; text-decoration: none; color: var(--text); font-size: 13px; border: 1px solid var(--border); }

    .post-footer { padding-top: 12px; border-top: 1px solid var(--border); margin-top: 10px; }
    .action-bar { display: flex; gap: 15px; margin-bottom: 10px; }
    .like-btn, .comment-btn { cursor: pointer; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; font-weight: bold; }

    .reaction-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .reac-item { background: var(--input-bg); padding: 4px 8px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); }

    .comment-section { background: rgba(0,0,0,0.1); border-radius: 8px; padding: 10px; margin-top: 10px; display: none; }
    .comment-list { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
    .comment-item { font-size: 12px; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .comment-item b { color: var(--primary); }
    
    .comment-input-box { display: flex; gap: 5px; }
    .comment-input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 12px; outline: none; }
    .btn-send-comment { background: var(--primary); color: #fff; border: none; padding: 5px 15px; border-radius: 20px; font-size: 12px; cursor: pointer; }

    /* Metadata Preview Styles */
    .meta-preview { background: #fff; color: #000; display: flex; border-top: 1px solid var(--border); }
    .meta-img { width: 100px; height: 100px; object-fit: cover; flex-shrink: 0; }
    .meta-info { padding: 10px; overflow: hidden; }
    .meta-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta-desc { font-size: 12px; color: #555; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>

</head>
<body>
<header>
    <div class="brand">LOMBOK LIVE</div>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 Malam</button>
</header>

<div class="container">
    <div class="shortcut-bar">
        <button class="btn-shortcut" onclick="window.location.href='/host.html'">🎥 Mulai Live</button>
        <button class="btn-shortcut" onclick="window.location.href='/watch.html'">📺 Nonton Live</button>
    </div>

    <div class="composer">
        <input type="text" id="userInput" class="name-bar" placeholder="Nama Anda...">
        <div class="composer-top">
            <div class="user-img"></div>
            <textarea id="txtStatus" placeholder="Ada info menarik hari ini?"></textarea>
        </div>
        <div id="previewArea" class="preview-box"></div>
        <div class="composer-bottom">
            <div class="tool-group">
                <label class="tool-btn">
                    <input type="file" id="mediaInput" hidden accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.zip,.apk,.rar,.7z">
                    📁
                </label>
            </div>
            <button class="btn-post" id="btnPublish" onclick="publish()">Posting</button>
        </div>
    </div>

    <div id="feed"></div>
</div>

<div id="fsOverlay" class="fullscreen-overlay">
    <div class="fs-header">
        <span id="fsTitle" style="color:#fff; font-size:12px; font-weight:bold;">Lombok Live View</span>
        <button class="fs-close" onclick="closeFullscreen()">TUTUP [X]</button>
    </div>
    <div id="fsBody" class="fs-body"></div>
</div>

<script>
    const socket = io();
    const mediaInput = document.getElementById('mediaInput');
    const previewArea = document.getElementById('previewArea');
    let fileToUpload = null;

    if(localStorage.getItem('mySocialName')) {
        document.getElementById('userInput').value = localStorage.getItem('mySocialName');
    }

    function toggleTheme() {
        const isLight = document.body.classList.toggle('light-mode');
        document.getElementById('themeBtn').innerHTML = isLight ? "☀️ Siang" : "🌙 Malam";
    }

    mediaInput.onchange = (e) => {
        fileToUpload = e.target.files[0];
        if(!fileToUpload) return;
        const url = URL.createObjectURL(fileToUpload);
        previewArea.style.display = 'block';
        if(fileToUpload.type.startsWith('image')) previewArea.innerHTML = `<img src="${url}">`;
        else if(fileToUpload.type.startsWith('video')) previewArea.innerHTML = `<video src="${url}" controls></video>`;
        else if(fileToUpload.name.endsWith('.apk')) previewArea.innerHTML = `<div class="doc-preview">🤖 Android App: ${fileToUpload.name}</div>`;
        else previewArea.innerHTML = `<div class="doc-preview">📄 File: ${fileToUpload.name}</div>`;
    };

    async function publish() {
        const status = document.getElementById('txtStatus').value;
        const name = document.getElementById('userInput').value || "Warga Lombok";
        if(!status && !fileToUpload) return;
        const btn = document.getElementById('btnPublish');
        btn.disabled = true;
        const fd = new FormData();
        fd.append('status', status);
        fd.append('username', name); 
        if(fileToUpload) fd.append('mediaFile', fileToUpload);

        try {
            await fetch('/api/posts', { method: 'POST', body: fd });
            document.getElementById('txtStatus').value = '';
            previewArea.style.display = 'none';
            fileToUpload = null;
        } catch (err) { alert("Gagal kirim!"); }
        btn.disabled = false;
    }

    async function handleReact(postId, emoji = null) {
        fetch(`/api/posts/${postId}/react`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ emoji })
        });
    }

    async function sendComment(postId) {
        const input = document.getElementById(`input-${postId}`);
        const name = document.getElementById('userInput').value || "Warga Lombok";
        if(!input.value) return;
        fetch(`/api/posts/${postId}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: name, text: input.value })
        });
        input.value = '';
    }

    function toggleReadMore(btn) {
        const content = btn.previousElementSibling;
        content.classList.toggle('content-collapsed');
        btn.innerText = content.classList.contains('content-collapsed') ? 'Baca selengkapnya...' : 'Tutup';
    }

    function toggleComments(postId) {
        const section = document.querySelector(`#post-${postId} .comment-section`);
        section.style.display = section.style.display === 'block' ? 'none' : 'block';
    }

    // Pin & Fullscreen Logic
    function openFullscreen(url, title) {
        const fsOverlay = document.getElementById('fsOverlay');
        const fsBody = document.getElementById('fsBody');
        const fsTitle = document.getElementById('fsTitle');
        
        fsTitle.innerText = title || "Viewing Content";
        
        const isVideo = /\.(mp4|webm|m3u8)$/i.test(url);
        
        if(isVideo) {
            fsBody.innerHTML = `<video src="${url}" controls autoplay class="preview-video"></video>`;
        } else {
            // Enhanced No-Bypass logic: Try direct first, then fallback to proxy IF AND ONLY IF necessary
            fsBody.innerHTML = `<iframe src="${url}" sandbox="allow-scripts allow-same-origin allow-popups" onerror="this.src='https://api.allorigins.win/raw?url=' + encodeURIComponent('${url}')"></iframe>`;
        }
        
        fsOverlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeFullscreen() {
        document.getElementById('fsOverlay').style.display = 'none';
        document.getElementById('fsBody').innerHTML = '';
        document.body.style.overflow = 'auto';
    }

    // --- ENHANCED MULTI-API & FORMAT PREVIEW LOGIC ---
    function getLivePlayerHtml(url) {
        // 1. YouTube API Format
        if(url.includes('youtube.com') || url.includes('youtu.be')) {
            let vidId = "";
            if(url.includes('v=')) vidId = url.split('v=')[1].split('&')[0];
            else vidId = url.split('/').pop();
            return `
                <div class="pin-btn" onclick="event.stopPropagation(); openFullscreen('https://www.youtube.com/embed/${vidId}', 'YouTube Player')">📌 Pin Layar</div>
                <iframe class="preview-iframe" src="https://www.youtube.com/embed/${vidId}" allowfullscreen></iframe>
            `;
        } 
        
        // 2. Facebook Video / Post
        if(url.includes('facebook.com')) {
            return `<iframe class="preview-iframe" src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0" allowfullscreen></iframe>`;
        }

        // 3. TikTok Embed
        if(url.includes('tiktok.com')) {
            const tkId = url.split('/video/')[1]?.split('?')[0];
            if(tkId) return `<iframe class="preview-iframe" src="https://www.tiktok.com/embed/v2/${tkId}"></iframe>`;
        }

        // 4. Google Drive View API (Untuk PDF/Docs)
        if(url.includes('drive.google.com') || url.endsWith('.pdf') || url.endsWith('.doc') || url.endsWith('.docx')) {
            return `<iframe class="preview-iframe" src="https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true"></iframe>`;
        }

        // 5. Direct Media (Video/Audio)
        const isVideo = /\.(mp4|webm|m3u8|ogg)$/i.test(url);
        const isAudio = /\.(mp3|wav|aac)$/i.test(url);
        if(isVideo) return `
            <div class="pin-btn" onclick="event.stopPropagation(); openFullscreen('${url}', 'Live Video')">📌 Pin Layar</div>
            <video class="preview-video" src="${url}" controls muted loop playsinline></video>
        `;
        if(isAudio) return `<div style="padding:40px 20px; background:#222;"><audio src="${url}" controls style="width:100%"></audio></div>`;

        // 6. Enhanced Meta Card for Generic Web (Fixing "Refused to connect")
        return `
            <div class="meta-preview" onclick="event.stopPropagation(); window.open('${url}', '_blank')" style="cursor:pointer; border-bottom:1px solid var(--border);">
                <img src="https://www.google.com/s2/favicons?sz=128&domain=${url}" class="meta-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1006/1006771.png'">
                <div class="meta-info">
                    <div class="meta-title">Buka Situs Web ↗</div>
                    <div class="meta-desc">${url}</div>
                    <div style="color:var(--primary); font-size:10px; margin-top:5px; font-weight:bold;">Situs ini diamankan. Klik tombol "Kunjungi" di bawah untuk melihat.</div>
                </div>
            </div>
        `;
    }

    function renderPost(data) {
        const id = data.id || data._id;
        let mediaHtml = "";
        let specialHtml = ""; 
        let footerHtml = "";

        if((data.isAds || data.isLive) && data.linkUrl) {
            const isLive = data.isLive;
            const btnClass = isLive ? 'btn-live' : '';
            const btnText = isLive ? 'Nonton Live ↗' : 'Kunjungi Situs ↗';
            const playerContent = getLivePlayerHtml(data.linkUrl);

            specialHtml = `
                <div class="click-wrapper">
                    ${playerContent}
                    <a href="${data.linkUrl}" target="_blank" class="click-footer-bar" style="text-decoration: none;">
                        <span class="url-text">${data.linkUrl}</span>
                        <div class="btn-visit ${btnClass}">${btnText}</div>
                    </a>
                </div>
            `;
            footerHtml = ""; 
        } else {
            if(data.mediaUrl) {
                if(data.mediaType === 'image') mediaHtml = `<img src="${data.mediaUrl}" class="post-media">`;
                else if(data.mediaType === 'video') mediaHtml = `<video src="${data.mediaUrl}" class="post-media" controls></video>`;
                else {
                    const icon = data.mediaUrl.endsWith('.apk') ? '🤖' : '📂';
                    mediaHtml = `<div style="padding:10px;"><a href="${data.mediaUrl}" class="file-link" download>${icon} File: Download</a></div>`;
                }
            }

            const reactionHtml = ["🔥", "😂", "😍", "👍"].map(em => `
                <span class="reac-item" onclick="handleReact('${id}', '${em}')">${em} ${data.reactions[em] || 0}</span>
            `).join('');

            const commentHtml = (data.comments || []).map(c => `
                <div class="comment-item"><b>${c.username}</b>: ${c.text}</div>
            `).join('');

            footerHtml = `
                <div class="post-footer">
                    <div class="reaction-row">${reactionHtml}</div>
                    <div class="action-bar">
                        <div class="like-btn" onclick="handleReact('${id}')">❤️ ${data.likesCount || 0}</div>
                        <div class="comment-btn" onclick="toggleComments('${id}')">💬 ${(data.comments || []).length}</div>
                    </div>
                    <div class="comment-section">
                        <div class="comment-list">${commentHtml}</div>
                        <div class="comment-input-box">
                            <input type="text" class="comment-input" id="input-${id}" placeholder="Balas...">
                            <button class="btn-send-comment" onclick="sendComment('${id}')">Kirim</button>
                        </div>
                    </div>
                </div>
            `;
        }

        const isLong = data.status && data.status.length > 200;
        const postClass = data.isAds ? 'is-ads' : (data.isLive ? 'is-live' : '');
        const badge = data.isAds ? '<span class="ads-badge">Iklan</span>' : (data.isLive ? '<span class="live-tag">● Live</span>' : '');

        return `
            <div class="post ${postClass}" id="post-${id}">
                <div class="post-info">
                    <b class="${data.isLive ? 'live-host' : ''}">@${data.username} ${badge}</b>
                    <span class="post-time">${new Date(data.createdAt).toLocaleTimeString()}</span>
                </div>
                <div class="post-content ${isLong ? 'content-collapsed' : ''}">${data.status}</div>
                ${isLong ? `<div class="read-more-btn" onclick="toggleReadMore(this)">Baca selengkapnya...</div>` : ''}
                ${specialHtml}
                ${mediaHtml}
                ${footerHtml}
            </div>`;
    }

    fetch('/api/posts').then(res => res.json()).then(posts => {
        document.getElementById('feed').innerHTML = posts.map(p => renderPost(p)).join('');
    });

    socket.on('post:new', (post) => {
        document.getElementById('feed').insertAdjacentHTML('afterbegin', renderPost(post));
    });

    socket.on('post:updated', (updatedPost) => {
        const el = document.getElementById(`post-${updatedPost.id}`);
        if(el) {
            const isCommVisible = el.querySelector('.comment-section')?.style.display === 'block';
            el.outerHTML = renderPost(updatedPost);
            if(isCommVisible && !updatedPost.isAds && !updatedPost.isLive) {
                document.getElementById(`post-${updatedPost.id}`).querySelector('.comment-section').style.display = 'block';
            }
        }
    });

    socket.on('post:deleted', (id) => document.getElementById(`post-${id}`)?.remove());
</script>

</body>
</html>
