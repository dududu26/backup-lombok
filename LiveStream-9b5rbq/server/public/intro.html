<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOMBOK STREAM - Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
            position: relative;
        }

        /* Responsive Decoration Circles */
        .decoration-circle {
            position: absolute;
            width: min(80vw, 500px);
            height: min(80vw, 500px);
            border: 2px solid rgba(255, 26, 26, 0.1);
            border-radius: 50%;
            border-top-color: rgba(255, 26, 26, 0.5);
            z-index: 1;
            animation: spin 10s linear infinite;
        }

        .decoration-circle.inner {
            width: min(70vw, 450px);
            height: min(70vw, 450px);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-bottom-color: rgba(255, 255, 255, 0.4);
            animation: spin-reverse 15s linear infinite;
        }

        .bg-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .line-anim {
            position: absolute;
            background: linear-gradient(to right, transparent, rgba(255, 26, 26, 0.2), transparent);
            height: 1px;
            width: 100%;
            transform: translateX(-100%);
            animation: moveLine 4s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes spin-reverse { to { transform: rotate(-360deg); } }
        @keyframes moveLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        body::before {
            content: "";
            position: absolute;
            width: 90%;
            height: 90%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ee/Lombok_Map_%28Simplified%29.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: invert(1) brightness(0.3) opacity(0.12);
            z-index: 0;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Logo Icons Responsive */
        .logo-icon-container {
            display: flex;
            gap: clamp(10px, 4vw, 20px);
            margin-bottom: clamp(10px, 5vh, 25px);
            opacity: 0;
            animation: fadeInIcon 1s ease forwards 0.5s;
        }

        @keyframes fadeInIcon {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-icon {
            width: clamp(35px, 12vw, 55px);
            height: clamp(35px, 12vw, 55px);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 10px rgba(255, 26, 26, 0.5));
        }

        .icon-mic { background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Microphone_icon_with_gradient_style.svg'); }
        .icon-camera { background-image: url('https://upload.wikimedia.org/wikipedia/commons/a/a2/Video_camera_icon_with_gradient_style.svg'); }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: clamp(1.8rem, 12vw, 3.5rem); 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0px;
            margin-bottom: 20px;
            letter-spacing: -1px;
            width: 100%;
        }

        .line {
            display: flex;
            justify-content: center;
            white-space: nowrap;
        }

        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(15px);
            animation: letterIn 0.5s ease-out forwards;
        }

        .lombok-line .char {
            background: linear-gradient(180deg, #ff1a1a, #800000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 26, 26, 0.3));
        }

        .stream-line .char {
            background: linear-gradient(180deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            font-size: 0.8em;
            letter-spacing: clamp(2px, 2vw, 5px);
            margin-top: -5px;
        }

        @keyframes letterIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .description-text {
            font-size: clamp(0.7rem, 3.8vw, 0.9rem);
            color: rgba(255, 255, 255, 0.7);
            min-height: 4.5em;
            margin-bottom: clamp(20px, 6vh, 40px);
            line-height: 1.6;
            max-width: 85%;
            font-weight: 400;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: #ff1a1a;
            margin-left: 3px;
            vertical-align: middle;
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .btn-continue {
            font-family: 'Inter', sans-serif;
            padding: clamp(10px, 3vw, 14px) clamp(25px, 8vw, 40px);
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #ff1a1a, #990000);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInBtn 0.8s ease forwards 4.5s; 
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-continue:active { transform: scale(0.95); }

        .creator-info {
            position: absolute;
            bottom: clamp(15px, 4vh, 30px);
            font-size: clamp(0.55rem, 2.5vw, 0.65rem);
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            width: 100%;
            text-align: center;
        }

        @keyframes fadeInBtn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exit-anim {
            animation: fadeExit 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }

        @keyframes fadeExit {
            to { opacity: 0; transform: scale(0.9) translateY(-20px); filter: blur(10px); }
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="bg-lines">
        <div class="line-anim" style="top: 25%; animation-delay: 0s;"></div>
        <div class="line-anim" style="top: 75%; animation-delay: 1.5s;"></div>
    </div>

    <div class="decoration-circle"></div>
    <div class="decoration-circle inner"></div>

    <div class="container" id="main-content">
        <div class="logo-icon-container">
            <div class="logo-icon icon-mic"></div>
            <div class="logo-icon icon-camera"></div>
        </div>

        <h1 class="logo-text" id="logo">
            <span class="line lombok-line" id="line1"></span>
            <span class="line stream-line" id="line2"></span>
        </h1>
        
        <div class="description-text">
            <span id="typewriter"></span><span class="cursor" id="cursor1"></span>
        </div>
        
        <a href="https://uncomplaining-aniya-zygophyllaceous.ngrok-free.dev/wa.html" 
           class="btn-continue" 
           id="btn-go">
           <div class="dot"></div>
           LANJUTKAN
        </a>
    </div>

    <div class="creator-info" id="creator">
        <span id="by-text"></span><span id="creator-name"></span><span class="cursor" id="cursor2" style="height: 0.8em; background-color: rgba(255,255,255,0.3);"></span>
    </div>

    <script>
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');
        const text1 = "LOMBOK";
        const text2 = "STREAM";
        const textDesc = "Platform hiburan digital masa kini yang menghubungkan kreativitas melalui interaksi real-time yang cerdas, cepat, dan sederhana.";
        const textCreatorPrefix = "BY ";
        const textCreatorName = "DUHA AL KHAIRI";
        
        const typewriterElement = document.getElementById('typewriter');
        const creatorNameElement = document.getElementById('creator-name');
        const byTextElement = document.getElementById('by-text');
        const btn = document.getElementById('btn-go');
        const mainContent = document.getElementById('main-content');
        const creator = document.getElementById('creator');

        function splitText(element, text, startDelay) {
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.innerText = char === ' ' ? '\u00A0' : char;
                span.className = 'char';
                span.style.animationDelay = `${startDelay + (index * 0.08)}s`;
                element.appendChild(span);
            });
        }

        splitText(line1, text1, 1);
        splitText(line2, text2, 1.5);

        let i = 0;
        function typeWriter() {
            if (i < textDesc.length) {
                typewriterElement.innerHTML += textDesc.charAt(i);
                i++;
                setTimeout(typeWriter, 35);
            } else {
                document.getElementById('cursor1').style.display = 'none';
                startCreatorTypewriter();
            }
        }

        let j = 0;
        byTextElement.innerHTML = textCreatorPrefix;
        function startCreatorTypewriter() {
            if (j < textCreatorName.length) {
                creatorNameElement.innerHTML += textCreatorName.charAt(j);
                j++;
                setTimeout(startCreatorTypewriter, 180); 
            } else {
                setTimeout(() => {
                    document.getElementById('cursor2').style.display = 'none';
                }, 1000);
            }
        }

        setTimeout(typeWriter, 2600);

        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const url = this.href;
            mainContent.classList.add('exit-anim');
            creator.classList.add('exit-anim');
            setTimeout(() => { window.location.href = url; }, 600);
        });
    </script>
</body>
</html>
